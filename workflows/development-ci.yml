name: development-ci

on:
  push:
    branches:
      - development

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Resolve dependencies
        run: cd go && go mod download

      - name: Build project
        run: cd go && go build ./...

      - name: Run unit tests
        run: cd go && go test ./...